<!doctype html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <script>
    try {
      window.localStorage.getItem('x')
    } catch (e) {
      const store = new Map()
      const shim = {
        getItem: (k) => (store.has(k) ? store.get(k) : null),
        setItem: (k, v) => { store.set(k, String(v)) },
        removeItem: (k) => { store.delete(k) },
        clear: () => { store.clear() },
        key: (i) => Array.from(store.keys())[i] ?? null,
        get length() { return store.size },
      }
      Object.defineProperty(window, 'localStorage', { value: shim, configurable: true })
    }
  </script>
  <style>
    html, body { margin: 0; padding: 0; height: auto; min-height: 0; }
    #plugin-root { height: auto; }
    body { display: block; }
    body > #plugin-root > fig-footer {
      background-color: var(--figma-color-bg);
      box-shadow: inset 0 1px 0 0 var(--figma-color-border);
      border-radius: 0 0 var(--radius-large) var(--radius-large);
    }
    dialog.fig-fill-picker-dialog {
      width: 300px; max-width: 300px; min-width: 300px;
      max-height: none; height: max-content;
    }
    .section-auto { display: none; }
    .section-auto.visible { display: contents; }
    .section-free { display: none; }
    .section-free.visible { display: block; }
    .hint {
      padding: 4px var(--spacer-3) 8px;
      color: var(--figma-color-text-secondary);
      font-family: 'Poppins', var(--font-family);
      font-size: var(--body-medium-fontSize);
      line-height: 1.4;
      text-transform: lowercase;
    }
    .preview-wrap {
      position: relative;
      margin: 8px;
      border: 1px solid var(--figma-color-border);
      border-radius: 4px;
      overflow: hidden;
      background: repeating-conic-gradient(var(--figma-color-bg-secondary) 0% 25%, var(--figma-color-bg) 0% 50%) 50% / 16px 16px;
      min-height: 80px;
    }
    .preview-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
    }
    .preview-label {
      position: absolute;
      bottom: 4px;
      right: 4px;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Poppins', var(--font-family);
      text-transform: lowercase;
    }
    .canvas-wrap {
      position: relative;
      margin: 8px;
      border: 1px solid var(--figma-color-border);
      border-radius: 4px;
      overflow: hidden;
      background: repeating-conic-gradient(var(--figma-color-bg-secondary) 0% 25%, var(--figma-color-bg) 0% 50%) 50% / 16px 16px;
      min-height: 120px;
      cursor: crosshair;
      user-select: none;
    }
    .canvas-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
    }
    .canvas-wrap .sel-rect {
      position: absolute;
      border: 2px solid #0d99ff;
      background: rgba(13, 153, 255, 0.1);
      pointer-events: none;
      box-sizing: border-box;
    }
    .canvas-wrap .sel-rect .sel-delete {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #0d99ff;
      color: white;
      font-size: 10px;
      line-height: 16px;
      text-align: center;
      cursor: pointer;
      pointer-events: all;
    }
    .sel-list {
      padding: 4px var(--spacer-3);
      font-family: 'Poppins', var(--font-family);
      font-size: 11px;
      color: var(--figma-color-text-secondary);
      text-transform: lowercase;
    }
    .sel-list-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 0;
    }
    .empty-state {
      padding: 16px var(--spacer-3);
      text-align: center;
      color: var(--figma-color-text-secondary);
      font-family: 'Poppins', var(--font-family);
      font-size: var(--body-medium-fontSize);
      text-transform: lowercase;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--figma-color-text-secondary);
      cursor: pointer;
      font-size: 11px;
      text-decoration: underline;
      padding: 4px var(--spacer-3);
      font-family: 'Poppins', var(--font-family);
      text-transform: lowercase;
    }
    .clear-btn:hover { color: var(--figma-color-text); }
    .detection-count {
      padding: 4px var(--spacer-3) 0;
      font-family: 'Poppins', var(--font-family);
      font-size: 11px;
      color: var(--figma-color-text-secondary);
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <div id="plugin-root">
    <fig-content>
      <fig-group name="Mode">
        <fig-field>
          <label>Split mode</label>
          <fig-options id="mode" options="Auto-detect, Split freely" value="Auto-detect"></fig-options>
        </fig-field>
      </fig-group>

      <span class="section-auto" id="auto-section">
        <fig-group name="Background removal">
          <fig-field>
            <label>Tolerance</label>
            <fig-slider id="tolerance" type="range" min="0" max="100" step="1" value="25" text></fig-slider>
          </fig-field>
          <fig-field>
            <label>Remove interior</label>
            <fig-switch id="remove-interior" checked></fig-switch>
          </fig-field>
          <p class="hint">removes background-colored areas inside the image too (e.g. white gaps between stickers).</p>
        </fig-group>
        <fig-group name="Detection">
          <fig-field>
            <label>Padding</label>
            <fig-slider id="padding" type="range" min="0" max="64" step="1" units="px" value="6" text></fig-slider>
          </fig-field>
        </fig-group>
        <fig-group name="Live preview">
          <div class="preview-wrap" id="auto-preview-wrap">
            <canvas id="auto-preview-canvas" width="264" height="180"></canvas>
            <span class="preview-label" id="auto-preview-label"></span>
          </div>
          <p class="detection-count" id="detection-count"></p>
        </fig-group>
      </span>

      <div class="section-free" id="free-section">
        <fig-group name="Preview">
          <div class="canvas-wrap" id="canvas-wrap">
            <canvas id="preview-canvas" width="264" height="180"></canvas>
          </div>
          <div id="sel-list" class="sel-list"></div>
          <div id="empty-hint" class="empty-state">select a layer, then draw rectangles on the preview to mark assets</div>
          <button class="clear-btn" id="clear-selections" style="display:none">clear all selections</button>
        </fig-group>
        <fig-group name="Options">
          <fig-field>
            <label>Remove background</label>
            <fig-switch id="remove-bg" checked></fig-switch>
          </fig-field>
          <fig-field>
            <label>Tolerance</label>
            <fig-slider id="tolerance-free" type="range" min="0" max="100" step="1" value="25" text></fig-slider>
          </fig-field>
        </fig-group>
      </div>

      <fig-group name="Output layout">
        <fig-field>
          <label>Auto-layout</label>
          <fig-switch id="auto-layout" checked></fig-switch>
        </fig-field>
        <fig-field>
          <label>Gap</label>
          <fig-slider id="layout-gap" type="range" min="0" max="100" step="1" units="px" value="16" text></fig-slider>
        </fig-field>
        <fig-field>
          <label>Vectorize</label>
          <fig-switch id="vectorize"></fig-switch>
        </fig-field>
      </fig-group>
    </fig-content>
    <fig-footer>
      <label id="status-split">Select a layer</label>
      <fig-button id="action-split" type="submit" disabled>Extract assets</fig-button>
    </fig-footer>
  </div>
  <script>
    let lastReportedHeight = 0
    let resizeRaf = 0

    function measurePanelHeight() {
      const root = document.getElementById('plugin-root')
      if (!root) return 0
      let h = Math.ceil(root.getBoundingClientRect().height)
      const openDialog = document.querySelector('dialog.fig-fill-picker-dialog[open]')
      if (openDialog) h = Math.max(h, Math.ceil(openDialog.getBoundingClientRect().bottom))
      return h
    }

    function reportHeight() {
      const h = measurePanelHeight()
      if (h && h !== lastReportedHeight) {
        lastReportedHeight = h
        parent.postMessage({ pluginMessage: { type: 'resize', height: h } }, '*')
      }
    }

    const pluginRoot = document.getElementById('plugin-root')
    if (pluginRoot && typeof ResizeObserver !== 'undefined') {
      new ResizeObserver(() => {
        if (resizeRaf) cancelAnimationFrame(resizeRaf)
        resizeRaf = requestAnimationFrame(reportHeight)
      }).observe(pluginRoot)
    }

    new MutationObserver(() => {
      if (resizeRaf) cancelAnimationFrame(resizeRaf)
      resizeRaf = requestAnimationFrame(reportHeight)
    }).observe(document.body, {
      childList: true, attributes: true, attributeFilter: ['open', 'class'], subtree: true,
    })

    // ---- Mode switching ----
    function applyMode(mode) {
      const autoSection = document.getElementById('auto-section')
      const freeSection = document.getElementById('free-section')
      if (mode === 'Split freely') {
        autoSection.classList.remove('visible')
        freeSection.classList.add('visible')
        renderFreePreview()
      } else {
        autoSection.classList.add('visible')
        freeSection.classList.remove('visible')
        updateAutoPreview()
      }
      requestAnimationFrame(reportHeight)
    }
    applyMode(document.getElementById('mode').value || 'Auto-detect')
    document.getElementById('mode').addEventListener('change', (e) => applyMode(e.target.value))

    // ---- Control helpers ----
    function setControlValue(id, value) {
      const input = document.getElementById(id)
      if (!input) return
      const next = String(value)
      input.value = next
      input.setAttribute('value', next)
    }

    function setPanelParams(values) {
      if (typeof values !== 'object' || values === null) return
      if ('mode' in values) { setControlValue('mode', values.mode); applyMode(String(values.mode)) }
      if ('tolerance' in values) { setControlValue('tolerance', values.tolerance); setControlValue('tolerance-free', values.tolerance) }
      if ('padding' in values) setControlValue('padding', values.padding)
      if ('layoutGap' in values) setControlValue('layout-gap', values.layoutGap)
      if ('vectorize' in values) {
        const vec = document.getElementById('vectorize')
        if (vec) vec.checked = !!values.vectorize
      }
    }

    function currentParams() {
      const mode = String(document.getElementById('mode').value)
      const tol = mode === 'Split freely'
        ? Number(document.getElementById('tolerance-free').value)
        : Number(document.getElementById('tolerance').value)
      return {
        mode,
        tolerance: tol,
        padding: Number(document.getElementById('padding').value),
        removeBg: mode === 'Split freely' ? document.getElementById('remove-bg').checked : true,
        autoLayout: document.getElementById('auto-layout').checked,
        layoutGap: Number(document.getElementById('layout-gap').value),
        vectorize: document.getElementById('vectorize').checked,
      }
    }

    // ---- Shared image state ----
    let sourceImg = null
    let sourceImgW = 1, sourceImgH = 1

    // ---- Auto-detect live preview ----
    const autoPreviewCanvas = document.getElementById('auto-preview-canvas')
    const autoPreviewCtx = autoPreviewCanvas.getContext('2d')
    let previewDebounce = null

    function removeBackground(imageData, tolerance, includeInterior) {
      const { data, width, height } = imageData
      const total = width * height
      let rSum = 0, gSum = 0, bSum = 0, count = 0
      for (let x = 0; x < width; x++) {
        for (const y of [0, height - 1]) {
          const i = (y * width + x) * 4
          if (data[i + 3] > 20) { rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2]; count++ }
        }
      }
      for (let y = 1; y < height - 1; y++) {
        for (const x of [0, width - 1]) {
          const i = (y * width + x) * 4
          if (data[i + 3] > 20) { rSum += data[i]; gSum += data[i + 1]; bSum += data[i + 2]; count++ }
        }
      }
      if (count === 0) { rSum = 255 * (width * 2 + height * 2); count = width * 2 + height * 2 }
      const bgR = rSum / count, bgG = gSum / count, bgB = bSum / count
      const maxDist = tolerance * 2.21
      const isBg = new Uint8Array(total)

      function isSimilar(idx) {
        const a = data[idx * 4 + 3]
        if (a < 20) return true
        const dr = data[idx * 4] - bgR, dg = data[idx * 4 + 1] - bgG, db = data[idx * 4 + 2] - bgB
        return Math.sqrt(dr * dr + dg * dg + db * db) <= maxDist
      }

      const queue = new Int32Array(total)
      let head = 0, tail = 0
      function seedIfBg(idx) { if (!isBg[idx] && isSimilar(idx)) { isBg[idx] = 1; queue[tail++] = idx } }
      for (let x = 0; x < width; x++) { seedIfBg(x); seedIfBg((height - 1) * width + x) }
      for (let y = 1; y < height - 1; y++) { seedIfBg(y * width); seedIfBg(y * width + width - 1) }
      while (head < tail) {
        const cur = queue[head++]
        const x = cur % width
        const neighbors = [cur - 1, cur + 1, cur - width, cur + width]
        for (let ni = 0; ni < 4; ni++) {
          const n = neighbors[ni]
          if (n < 0 || n >= total) continue
          const nx = n % width
          if (ni === 0 && nx >= x) continue
          if (ni === 1 && nx <= x) continue
          if (!isBg[n] && isSimilar(n)) { isBg[n] = 1; queue[tail++] = n }
        }
      }

      if (includeInterior) {
        for (let i = 0; i < total; i++) {
          if (!isBg[i] && isSimilar(i)) isBg[i] = 1
        }
      }

      const result = new Uint8ClampedArray(data)
      for (let i = 0; i < total; i++) { if (isBg[i]) result[i * 4 + 3] = 0 }
      return new ImageData(result, width, height)
    }

    function findObjects(imageData, padding) {
      const { data, width, height } = imageData
      const total = width * height
      const mask = new Uint8Array(total)
      for (let i = 0; i < total; i++) { if (data[i * 4 + 3] > 20) mask[i] = 1 }
      const labels = new Int32Array(total).fill(-1)
      const components = []
      const queue = new Int32Array(total)
      for (let start = 0; start < total; start++) {
        if (mask[start] === 0 || labels[start] !== -1) continue
        const label = components.length
        let head = 0, tail = 0
        queue[tail++] = start; labels[start] = label
        let minX = start % width, maxX = minX, minY = (start / width) | 0, maxY = minY, size = 0
        while (head < tail) {
          const cur = queue[head++]; size++
          const cx = cur % width, cy = (cur / width) | 0
          if (cx < minX) minX = cx; if (cx > maxX) maxX = cx
          if (cy < minY) minY = cy; if (cy > maxY) maxY = cy
          for (const n of [cur - 1, cur + 1, cur - width, cur + width]) {
            if (n >= 0 && n < total && mask[n] === 1 && labels[n] === -1) { labels[n] = label; queue[tail++] = n }
          }
        }
        components.push({ minX, minY, maxX, maxY, size })
      }
      const minSize = total * 0.003
      return components.filter(c => c.size >= minSize)
        .map(c => ({
          x: Math.max(0, c.minX - padding), y: Math.max(0, c.minY - padding),
          w: Math.min(width - Math.max(0, c.minX - padding), (c.maxX - c.minX + 1) + padding * 2),
          h: Math.min(height - Math.max(0, c.minY - padding), (c.maxY - c.minY + 1) + padding * 2),
        }))
        .sort((a, b) => (a.y !== b.y ? a.y - b.y : a.x - b.x))
    }

    // ---- Vectorize: trace alpha contour to SVG ----
    function traceAlphaToSvg(imageData) {
      const { data, width, height } = imageData
      const grid = new Uint8Array(width * height)
      for (let i = 0; i < width * height; i++) grid[i] = data[i * 4 + 3] > 40 ? 1 : 0
      const gw = width + 1, gh = height + 1
      function sample(x, y) { return (x < 0 || x >= width || y < 0 || y >= height) ? 0 : grid[y * width + x] }
      const segments = []
      for (let y = 0; y < gh - 1; y++) {
        for (let x = 0; x < gw - 1; x++) {
          const tl = sample(x-1, y-1), tr = sample(x, y-1), bl = sample(x-1, y), br = sample(x, y)
          const idx = (tl << 3) | (tr << 2) | (br << 1) | bl
          switch (idx) {
            case 1: case 14: segments.push([x, y+0.5, x+0.5, y+1]); break
            case 2: case 13: segments.push([x+0.5, y+1, x+1, y+0.5]); break
            case 3: case 12: segments.push([x, y+0.5, x+1, y+0.5]); break
            case 4: case 11: segments.push([x+0.5, y, x+1, y+0.5]); break
            case 5: segments.push([x, y+0.5, x+0.5, y]); segments.push([x+0.5, y+1, x+1, y+0.5]); break
            case 6: case 9: segments.push([x+0.5, y, x+0.5, y+1]); break
            case 7: case 8: segments.push([x, y+0.5, x+0.5, y]); break
            case 10: segments.push([x+0.5, y, x+1, y+0.5]); segments.push([x, y+0.5, x+0.5, y+1]); break
          }
        }
      }
      if (segments.length === 0) return null
      const paths = []; const used = new Uint8Array(segments.length)
      function dist(x1,y1,x2,y2) { return Math.abs(x1-x2)+Math.abs(y1-y2) }
      for (let s = 0; s < segments.length; s++) {
        if (used[s]) continue; used[s] = 1
        const path = [[segments[s][0], segments[s][1]], [segments[s][2], segments[s][3]]]
        let changed = true
        while (changed) {
          changed = false
          const eX = path[path.length-1][0], eY = path[path.length-1][1]
          for (let i = 0; i < segments.length; i++) {
            if (used[i]) continue
            if (dist(segments[i][0], segments[i][1], eX, eY) < 0.01) { path.push([segments[i][2], segments[i][3]]); used[i] = 1; changed = true; break }
            if (dist(segments[i][2], segments[i][3], eX, eY) < 0.01) { path.push([segments[i][0], segments[i][1]]); used[i] = 1; changed = true; break }
          }
        }
        if (path.length >= 3) paths.push(path)
      }
      function simplify(pts, tol) {
        if (pts.length <= 2) return pts
        let maxD = 0, maxI = 0
        const f = pts[0], l = pts[pts.length-1]
        for (let i = 1; i < pts.length-1; i++) { const d = ptLineDist(pts[i],f,l); if (d > maxD) { maxD = d; maxI = i } }
        if (maxD > tol) { const left = simplify(pts.slice(0, maxI+1), tol); const right = simplify(pts.slice(maxI), tol); return left.slice(0,-1).concat(right) }
        return [f, l]
      }
      function ptLineDist(p, a, b) {
        const dx = b[0]-a[0], dy = b[1]-a[1], len2 = dx*dx+dy*dy
        if (len2 === 0) return Math.hypot(p[0]-a[0], p[1]-a[1])
        let t = ((p[0]-a[0])*dx + (p[1]-a[1])*dy) / len2
        t = Math.max(0, Math.min(1, t))
        return Math.hypot(p[0]-(a[0]+t*dx), p[1]-(a[1]+t*dy))
      }
      let pathData = ''
      for (const path of paths) {
        const s = simplify(path, 1.0)
        if (s.length < 2) continue
        pathData += 'M' + s[0][0].toFixed(1) + ',' + s[0][1].toFixed(1)
        for (let i = 1; i < s.length; i++) pathData += 'L' + s[i][0].toFixed(1) + ',' + s[i][1].toFixed(1)
        pathData += 'Z '
      }
      if (!pathData) return null
      return '<svg xmlns="http://www.w3.org/2000/svg" width="' + width + '" height="' + height + '" viewBox="0 0 ' + width + ' ' + height + '"><path d="' + pathData.trim() + '" fill="black"/></svg>'
    }

    function updateAutoPreview() {
      if (!sourceImg) return
      if (previewDebounce) cancelAnimationFrame(previewDebounce)
      previewDebounce = requestAnimationFrame(() => { renderAutoPreview() })
    }

    function renderAutoPreview() {
      if (!sourceImg) return
      const tolerance = Number(document.getElementById('tolerance').value)
      const padding = Number(document.getElementById('padding').value)
      const includeInterior = document.getElementById('remove-interior').checked

      const maxDim = 256
      const scale = Math.min(1.0, maxDim / Math.max(sourceImgW, sourceImgH))
      const sw = Math.max(1, Math.round(sourceImgW * scale))
      const sh = Math.max(1, Math.round(sourceImgH * scale))
      const smallCanvas = new OffscreenCanvas(sw, sh)
      const sCtx = smallCanvas.getContext('2d')
      sCtx.drawImage(sourceImg, 0, 0, sw, sh)
      const smallData = sCtx.getImageData(0, 0, sw, sh)

      const cleanData = removeBackground(smallData, tolerance, includeInterior)
      const scaledPadding = Math.max(0, Math.round(padding * scale))
      const regions = findObjects(cleanData, scaledPadding)

      const displayW = document.getElementById('auto-preview-wrap').clientWidth - 2
      const displayScale = displayW / sw
      const displayH = Math.round(sh * displayScale)
      autoPreviewCanvas.width = displayW
      autoPreviewCanvas.height = displayH
      autoPreviewCanvas.style.width = displayW + 'px'
      autoPreviewCanvas.style.height = displayH + 'px'

      const tempCanvas = new OffscreenCanvas(sw, sh)
      tempCanvas.getContext('2d').putImageData(cleanData, 0, 0)
      autoPreviewCtx.clearRect(0, 0, displayW, displayH)
      autoPreviewCtx.drawImage(tempCanvas, 0, 0, displayW, displayH)

      autoPreviewCtx.strokeStyle = '#0d99ff'
      autoPreviewCtx.lineWidth = 1.5
      autoPreviewCtx.setLineDash([3, 3])
      regions.forEach(r => {
        autoPreviewCtx.strokeRect(r.x * displayScale, r.y * displayScale, r.w * displayScale, r.h * displayScale)
      })
      autoPreviewCtx.setLineDash([])

      document.getElementById('auto-preview-label').textContent = regions.length + ' asset' + (regions.length === 1 ? '' : 's') + ' detected'
      document.getElementById('detection-count').textContent = regions.length > 0
        ? 'detected ' + regions.length + ' separate asset' + (regions.length === 1 ? '' : 's')
        : 'no assets detected — try adjusting tolerance'
      requestAnimationFrame(reportHeight)
    }

    document.getElementById('tolerance').addEventListener('input', updateAutoPreview)
    document.getElementById('tolerance').addEventListener('change', updateAutoPreview)
    document.getElementById('padding').addEventListener('input', updateAutoPreview)
    document.getElementById('padding').addEventListener('change', updateAutoPreview)
    document.getElementById('remove-interior').addEventListener('change', updateAutoPreview)

    // ---- Free-draw selections ----
    let selections = []
    let freePreviewImg = null
    let freeImgNatW = 1, freeImgNatH = 1
    let isDrawing = false, drawStart = null

    const canvasWrap = document.getElementById('canvas-wrap')
    const previewCanvas = document.getElementById('preview-canvas')
    const previewCtx = previewCanvas.getContext('2d')

    function getFreeCanvasScale() {
      const displayW = canvasWrap.clientWidth
      return displayW / freeImgNatW
    }

    function renderFreePreview() {
      if (!freePreviewImg) return
      const scale = getFreeCanvasScale()
      const displayW = Math.round(freeImgNatW * scale)
      const displayH = Math.round(freeImgNatH * scale)
      previewCanvas.width = displayW
      previewCanvas.height = displayH
      previewCanvas.style.width = displayW + 'px'
      previewCanvas.style.height = displayH + 'px'
      previewCtx.drawImage(freePreviewImg, 0, 0, displayW, displayH)
    }

    function renderSelections() {
      const existing = canvasWrap.querySelectorAll('.sel-rect')
      existing.forEach(el => el.remove())
      const scale = getFreeCanvasScale()
      selections.forEach((sel, i) => {
        const div = document.createElement('div')
        div.className = 'sel-rect'
        div.style.left = Math.round(sel.x * scale) + 'px'
        div.style.top = Math.round(sel.y * scale) + 'px'
        div.style.width = Math.round(sel.w * scale) + 'px'
        div.style.height = Math.round(sel.h * scale) + 'px'
        const del = document.createElement('span')
        del.className = 'sel-delete'
        del.textContent = '×'
        del.addEventListener('click', () => { selections.splice(i, 1); renderSelections(); updateSelList() })
        div.appendChild(del)
        canvasWrap.appendChild(div)
      })
    }

    function updateSelList() {
      const listEl = document.getElementById('sel-list')
      const emptyEl = document.getElementById('empty-hint')
      const clearBtn = document.getElementById('clear-selections')
      if (selections.length === 0) {
        listEl.innerHTML = ''
        emptyEl.style.display = 'block'
        clearBtn.style.display = 'none'
      } else {
        emptyEl.style.display = 'none'
        clearBtn.style.display = 'block'
        listEl.innerHTML = selections.map((s, i) =>
          '<div class="sel-list-item"><span>sel_' + (i + 1) + '</span><span>' + Math.round(s.w) + ' × ' + Math.round(s.h) + 'px</span></div>'
        ).join('')
      }
      requestAnimationFrame(reportHeight)
    }

    document.getElementById('clear-selections').addEventListener('click', () => {
      selections = []
      renderSelections()
      updateSelList()
    })

    canvasWrap.addEventListener('pointerdown', (e) => {
      if (!freePreviewImg) return
      if (e.target.classList && e.target.classList.contains('sel-delete')) return
      isDrawing = true
      const rect = canvasWrap.getBoundingClientRect()
      drawStart = { x: e.clientX - rect.left, y: e.clientY - rect.top }
      canvasWrap.setPointerCapture(e.pointerId)
    })

    canvasWrap.addEventListener('pointermove', (e) => {
      if (!isDrawing || !drawStart) return
      const rect = canvasWrap.getBoundingClientRect()
      const curX = e.clientX - rect.left
      const curY = e.clientY - rect.top
      let tempRect = canvasWrap.querySelector('.sel-rect-temp')
      if (!tempRect) {
        tempRect = document.createElement('div')
        tempRect.className = 'sel-rect sel-rect-temp'
        canvasWrap.appendChild(tempRect)
      }
      const left = Math.min(drawStart.x, curX)
      const top = Math.min(drawStart.y, curY)
      const w = Math.abs(curX - drawStart.x)
      const h = Math.abs(curY - drawStart.y)
      tempRect.style.left = left + 'px'
      tempRect.style.top = top + 'px'
      tempRect.style.width = w + 'px'
      tempRect.style.height = h + 'px'
    })

    canvasWrap.addEventListener('pointerup', (e) => {
      if (!isDrawing || !drawStart) return
      isDrawing = false
      const rect = canvasWrap.getBoundingClientRect()
      const endX = e.clientX - rect.left
      const endY = e.clientY - rect.top
      const tempRect = canvasWrap.querySelector('.sel-rect-temp')
      if (tempRect) tempRect.remove()
      const scale = getFreeCanvasScale()
      const left = Math.min(drawStart.x, endX) / scale
      const top = Math.min(drawStart.y, endY) / scale
      const w = Math.abs(endX - drawStart.x) / scale
      const h = Math.abs(endY - drawStart.y) / scale
      if (w >= 4 && h >= 4) {
        selections.push({
          x: Math.max(0, Math.round(left)),
          y: Math.max(0, Math.round(top)),
          w: Math.min(Math.round(w), freeImgNatW - Math.round(left)),
          h: Math.min(Math.round(h), freeImgNatH - Math.round(top)),
        })
        renderSelections()
        updateSelList()
      }
      drawStart = null
    })

    // ---- Action button ----
    document.getElementById('action-split').addEventListener('click', () => {
      const params = currentParams()
      const includeInterior = document.getElementById('remove-interior').checked
      const msg = { type: 'action', id: 'split', params: { ...params, removeInterior: includeInterior } }
      if (params.mode === 'Split freely' && selections.length > 0) {
        msg.manualRegions = selections.slice()
      }
      parent.postMessage({ pluginMessage: msg }, '*')
    })

    // ---- Image processing (for final extract) ----
    function bytesToBase64(bytes) {
      let binary = ''
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i])
      return btoa(binary)
    }

    window.addEventListener('message', async (event) => {
      const msg = event.data && event.data.pluginMessage
      if (!msg) return

      if (msg.type === 'preview-image') {
        const bytes = new Uint8Array(msg.bytes)
        const blob = new Blob([bytes], { type: 'image/png' })
        const url = URL.createObjectURL(blob)
        const img = new Image()
        img.onload = () => {
          URL.revokeObjectURL(url)
          sourceImg = img
          sourceImgW = img.width
          sourceImgH = img.height
          freePreviewImg = img
          freeImgNatW = img.width
          freeImgNatH = img.height
          const mode = document.getElementById('mode').value
          if (mode === 'Auto-detect') updateAutoPreview()
          else { renderFreePreview(); renderSelections() }
          document.getElementById('empty-hint').textContent = 'draw rectangles on the preview to mark each asset'
          requestAnimationFrame(reportHeight)
        }
        img.onerror = () => URL.revokeObjectURL(url)
        img.src = url
        return
      }

      if (msg.type !== 'process-image') return
      const { bytes, tolerance, padding, removeBg, mode, manualRegions, vectorize } = msg
      const includeInterior = msg.params && msg.params.removeInterior !== undefined ? msg.params.removeInterior : true

      try {
        const blob = new Blob([new Uint8Array(bytes)], { type: 'image/png' })
        const url = URL.createObjectURL(blob)
        const img = await new Promise((resolve, reject) => {
          const i = new Image(); i.onload = () => resolve(i); i.onerror = reject; i.src = url
        })
        URL.revokeObjectURL(url)
        const imgWidth = img.width, imgHeight = img.height
        const fullCanvas = new OffscreenCanvas(imgWidth, imgHeight)
        const fullCtx = fullCanvas.getContext('2d')
        fullCtx.drawImage(img, 0, 0)
        const fullData = fullCtx.getImageData(0, 0, imgWidth, imgHeight)

        let regions
        if (mode === 'Split freely' && manualRegions && manualRegions.length > 0) {
          regions = manualRegions.map(r => ({
            x: Math.max(0, Math.min(r.x, imgWidth - 1)),
            y: Math.max(0, Math.min(r.y, imgHeight - 1)),
            w: Math.min(r.w, imgWidth - r.x),
            h: Math.min(r.h, imgHeight - r.y),
          })).filter(r => r.w > 0 && r.h > 0)
        } else {
          const maxDim = 1024
          const scale = Math.min(1.0, maxDim / Math.max(imgWidth, imgHeight))
          const sw = Math.max(1, Math.round(imgWidth * scale))
          const sh = Math.max(1, Math.round(imgHeight * scale))
          const smallCanvas = new OffscreenCanvas(sw, sh)
          const sCtx = smallCanvas.getContext('2d')
          sCtx.drawImage(img, 0, 0, sw, sh)
          const smallData = sCtx.getImageData(0, 0, sw, sh)
          const scaledPadding = Math.max(0, Math.round(padding * scale))
          const cleanData = removeBackground(smallData, tolerance, includeInterior)
          const rawRegions = findObjects(cleanData, scaledPadding)
          regions = rawRegions.map(r => ({
            x: Math.round(r.x / scale), y: Math.round(r.y / scale),
            w: Math.min(imgWidth - Math.round(r.x / scale), Math.round(r.w / scale)),
            h: Math.min(imgHeight - Math.round(r.y / scale), Math.round(r.h / scale)),
          })).filter(r => r.w > 0 && r.h > 0)
        }

        if (regions.length === 0) {
          parent.postMessage({ pluginMessage: { type: 'crops-ready', crops: [], svgs: [], regions: [], imageWidth: imgWidth, imageHeight: imgHeight } }, '*')
          return
        }

        let cropSource = fullCanvas
        if (removeBg) {
          const cleanFullData = removeBackground(fullData, tolerance, includeInterior)
          const cleanFullCanvas = new OffscreenCanvas(imgWidth, imgHeight)
          cleanFullCanvas.getContext('2d').putImageData(cleanFullData, 0, 0)
          cropSource = cleanFullCanvas
        }

        const crops = []
        const svgs = []
        for (let ri = 0; ri < regions.length; ri++) {
          const region = regions[ri]
          const cropCanvas = new OffscreenCanvas(Math.max(1, region.w), Math.max(1, region.h))
          const cropCtx = cropCanvas.getContext('2d')
          cropCtx.drawImage(cropSource, region.x, region.y, region.w, region.h, 0, 0, region.w, region.h)
          const pngBlob = await cropCanvas.convertToBlob({ type: 'image/png' })
          const buf = await pngBlob.arrayBuffer()
          crops.push(bytesToBase64(new Uint8Array(buf)))

          if (vectorize) {
            const cropData = cropCtx.getImageData(0, 0, region.w, region.h)
            const svg = traceAlphaToSvg(cropData)
            svgs.push(svg || '')
          } else {
            svgs.push('')
          }
        }

        parent.postMessage({ pluginMessage: { type: 'crops-ready', crops, svgs, regions, imageWidth: imgWidth, imageHeight: imgHeight } }, '*')
      } catch (err) {
        parent.postMessage({ pluginMessage: { type: 'crops-ready', crops: [], svgs: [], regions: [], imageWidth: 1, imageHeight: 1 } }, '*')
      }
    })

    window.addEventListener('message', (event) => {
      const msg = event.data && event.data.pluginMessage
      if (!msg) return
      if (msg.type === 'params-change') { setPanelParams(msg.params); return }
      if (msg.type === 'action-state' && msg.actions) {
        const a = msg.actions['split']
        const button = document.getElementById('action-split')
        if (a && button) {
          if (a.enabled === false) button.setAttribute('disabled', '')
          else button.removeAttribute('disabled')
          if (typeof a.label === 'string') button.textContent = a.label
        }
        const statusEl = document.getElementById('status-split')
        if (a && statusEl && typeof a.status === 'string') statusEl.textContent = a.status
      }
    })

    // Request preview on load
    parent.postMessage({ pluginMessage: { type: 'load-preview' } }, '*')
  </script>
</body>
</html>
